name: App / Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v1.8.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .tools-versions
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884 # v5.0.1
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is required for signed release builds."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\n' | base64 -d > release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=${KEYSTORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
          } > keystore.properties
          ls -la release.keystore keystore.properties
      - name: Resolve release tag
        env:
          RAW_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          RELEASE_TAG="${RAW_RELEASE_TAG#refs/tags/}"
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::Release tag must start with 'v' (e.g. v1.8.3). Got: $RELEASE_TAG"
            exit 1
          fi
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"
      - name: Assemble GitHub release APK
        run: ./gradlew assembleGithubRelease -Pstonecrusher.version="$VERSION"
      - name: Stage release APK
        run: |
          mkdir -p build/gh-app-publish/
          cp app/build/outputs/apk/github/release/*.apk build/gh-app-publish/
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; uploading APK assets"
            gh release upload "${RELEASE_TAG}" build/gh-app-publish/*.apk --clobber
          else
            gh release create "${RELEASE_TAG}" \
              build/gh-app-publish/*.apk \
              --generate-notes
          fi
      - name: Update version on master
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout master
          sed -i "s/^stonecrusher.version=.*/stonecrusher.version=${VERSION}/" gradle.properties
      # GITHUB_TOKEN cannot bypass branch protection rulesets. Use a GitHub App
      # installation token instead (secrets RELEASE_APP_ID, RELEASE_APP_PRIVATE_KEY).
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Commit version update
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          if git diff --cached --quiet; then
            echo "gradle.properties already at version ${VERSION}; nothing to commit."
            exit 0
          fi
          git commit -m "Update stonecrusher.version to ${VERSION} for release ${RELEASE_TAG}"
          git config --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin master
