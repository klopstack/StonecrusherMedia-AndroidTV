# Gradle
org.gradle.jvmargs=-Xmx2048m

# Emby server support (requires server/emby and playback/emby modules).
# Set to true only when building and testing against an Emby server.
moonfin.emby.enabled=false

# Allow switching between flavors of the Jellyfin SDK. Possible values are:
# - "default"
# - "local" (local Maven repository)
# - "snapshot" (SDK master)
# - "unstable-snapshot" (SDK with unstable Jellyfin API)
sdk.version=default

# Android
android.newDsl=false
stonecrusher.version=1.8.2

# GitHub repo used for OTA updates (github flavor)
github.owner=klopstack
github.repo=Moonfin-AndroidTV-FireTV